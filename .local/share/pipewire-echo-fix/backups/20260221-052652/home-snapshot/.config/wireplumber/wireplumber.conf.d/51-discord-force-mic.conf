# Force Discord/WebRTC voice capture streams to use the physical microphone
# to prevent desktop audio monitor sources from leaking into calls.
stream.rules = [
  {
    matches = [
      {
        media.class = "Stream/Input/Audio"
        application.name = "WEBRTC VoiceEngine"
      }
      {
        media.class = "Stream/Input/Audio"
        application.process.binary = "~^(Discord|discord|vesktop|webcord)$"
      }
    ]
    actions = {
      update-props = {
        target.object = "alsa_input.pci-0000_00_1f.3.analog-stereo"
        state.restore-target = false
      }
    }
  }
]
