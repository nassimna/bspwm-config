# Force Discord/WebRTC voice capture streams to use the virtual microphone
# (which itself is sourced from the physical mic) to prevent monitor-source leaks.
stream.rules = [
  {
    matches = [
      {
        media.class = "Stream/Input/Audio"
        application.name = "WEBRTC VoiceEngine"
      }
      {
        media.class = "Stream/Input/Audio"
        application.process.binary = "~^(Discord|discord|vesktop|webcord)$"
      }
    ]
    actions = {
      update-props = {
        target.object = "virtual_mic.source"
        state.restore-target = false
      }
    }
  }
]
