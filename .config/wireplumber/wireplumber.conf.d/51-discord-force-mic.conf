# Force Discord/WebRTC voice capture streams to use the echo-cancelled virtual microphone.
stream.rules = [
  {
    matches = [
      {
        media.class = "Stream/Input/Audio"
        application.name = "WEBRTC VoiceEngine"
      }
      {
        media.class = "Stream/Input/Audio"
        application.process.binary = "~^(Discord|discord|vesktop|webcord|chrome|chromium)$"
      }
    ]
    actions = {
      update-props = {
        target.object = "virtual_mic_ec.source"
        state.restore-props = false
        state.restore-target = false
      }
    }
  }
]
