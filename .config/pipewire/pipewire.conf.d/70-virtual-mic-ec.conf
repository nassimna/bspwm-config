# Echo-cancelled virtual microphone for voice chat.
# Uses real mic as capture and default sink monitor as echo reference.
context.modules = [
  {
    name = libpipewire-module-echo-cancel
    args = {
      monitor.mode = true
      audio.rate = 48000
      audio.channels = 1
      audio.position = [ MONO ]
      # Keep AGC disabled to avoid pumping, but enable noise suppression.
      aec.args = "webrtc.gain_control=0 webrtc.voice_detection=0 webrtc.noise_suppression=1 webrtc.high_pass_filter=1"

      capture.props = {
        node.name = "virtual_mic_ec.capture"
        target.object = "alsa_input.pci-0000_00_1f.3.analog-stereo"
        node.passive = true
        audio.channels = 1
        audio.position = [ MONO ]
      }

      source.props = {
        node.name = "virtual_mic_ec.source"
        node.description = "Virtual Mic (Echo Cancel)"
        media.class = "Audio/Source"
        audio.channels = 1
        audio.position = [ MONO ]
      }

      playback.props = {
        node.name = "virtual_mic_ec.playback"
        node.passive = true
      }
    }
  }
]
